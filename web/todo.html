<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>간단한 Todo</title>
  <link rel="stylesheet" href="todo.css">
</head>
<body>
  <div class="app">
    <h1>할 일 목록</h1>
    <div class="input-row">
      <input id="newTodo" placeholder="할 일을 입력하세요">
      <button id="addBtn">추가</button>
    </div>
    <ul id="list"></ul>
    <div class="controls">
      <button id="clearCompleted">완료 항목 삭제</button>
      <button id="clearAll">전체 삭제</button>
    </div>
  </div>
  <script src="todo.js"></script>
</body>
</html>
